[build]
  command   = "cd frontend && yarn install && yarn build"
  publish   = "frontend/build"

[build.environment]
  NODE_VERSION = "20"
  CI           = "false"

# Proxy: reenvía /api/* al backend en VPS propio
[[redirects]]
  from   = "/api/*"
  to     = "https://api.sudeporte.com/api/:splat"
  status = 200
  force  = true

# SPA catch-all (debe ir después del proxy)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
