[build]
  command   = "cd frontend && yarn install && yarn build"
  publish   = "frontend/build"

[build.environment]
  NODE_VERSION = "20"
  CI           = "false"

# Proxy: reenvía /api/* a Railway — elimina CORS completamente
[[redirects]]
  from   = "/api/*"
  to     = "https://graceful-magic-production-c9ee.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA catch-all (debe ir después del proxy)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
